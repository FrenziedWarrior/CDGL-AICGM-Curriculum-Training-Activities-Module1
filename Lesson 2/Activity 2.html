<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Lesson 2 Activity 2 - Try Formatting</title>
        <link rel="stylesheet" href="style.css" type="text/css" />
    </head>

    <body>
        <!-- This activity is going to teach you how to use various HTML formatting tags -->

        <b>Not all those who wander are lost.</b><br>

        <strong>Not all those who wander are lost.</strong><br>

        <i>Not all those who wander are lost.</i><br>

        <em>Not all those who wander are lost.</em><br>

        <mark>Not all those who wander are lost.</mark><br>

        <small>Not all those who wander are lost.</small><br>

        <del>Not all those who wander are lost.</del><br>

        Not <sup>all</sup> those who wander are <sub>lost</sub>.
    </body>
</html>
