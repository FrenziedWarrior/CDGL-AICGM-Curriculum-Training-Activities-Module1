<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Activity 1</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1>Personal Details Form</h1>
    <h3>Fill in these basic details to continue</h3>

    <form>
      <label for="name">Name</label> <br>
      <input type="text" name="name" id="name" /> 
      <br><br>

      <label for="email">Email ID</label> <br>
      <input type="email" name="email" id="email" /> 
      <br><br>

      <label for="contact">Contact Number (We won't reveal)</label> <br>
      <input type="password" name="contact" id="contact" /> 
      <br><br>

      <label for="gender">Gender</label> <br>
      <input type="radio" name="gender" id="gender-m" /> Male <br>
      <input type="radio" name="gender" id="gender-f" /> Female
      <br><br>

      <label for="food">Favorite food?</label> <br>
      <input type="checkbox" name="food" id="food-1"> Chicken <br>
      <input type="checkbox" name="food" id="food-2"> Paneer <br>
      <input type="checkbox" name="food" id="food-3"> Soyabean
      <br><br>

      <input type="submit" value="Save details" />
    </form>
  </body>
</html>
