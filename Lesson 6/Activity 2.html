<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lesson 6 Activity 2 - Group the Form Fields</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <form>
      <fieldset>
        <legend>Give Us Your Personal Details</legend>
        <label for="name">Name</label> <br />
        <input type="text" name="name" id="name" />
        <br /><br />

        <label for="email">Email ID</label> <br />
        <input type="email" name="email" id="email" />
        <br /><br />

        <label for="gender">Gender</label> <br />

        <label>
          <input type="radio" name="gender" id="gender-m" /> Male <br />
        </label>
        <label>
          <input type="radio" name="gender" id="gender-f" /> Female <br /><br />
        </label>

        <label for="dob">Birthday</label> <br />
        <input type="date" name="dob" id="dob" />
        <br /><br />
      </fieldset>
    </form>
  </body>
</html>
